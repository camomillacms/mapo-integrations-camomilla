name: CD

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release mode"
        required: true
        type: choice
        options:
          - normal
          - dry-run
        default: dry-run

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  guard:
    name: Block release from main
    runs-on: ubuntu-latest
    steps:
      - name: Disallow running from main
        if: github.ref_name == 'master'
        run: |
          echo "::error::The CD workflow must not be run from 'main'. Trigger it from 'beta' (or another release branch)."
          exit 1
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: guard
    if: github.event.inputs.release_mode == 'normal'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Ensure npm >= 11.5.1 (required for OIDC trusted publishing)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tokenless publish via npm OIDC trusted publishing — NO NPM_TOKEN.
          # Requires: a Trusted Publisher registered on npmjs.com for this package
          # pointing at THIS GitHub repo + workflow file (cd.yml), npm >= 11.5.1
          # (installed above) and `id-token: write` (set above).
          # WARNING: defining NPM_TOKEN here at all — even empty — disables OIDC,
          # because npm then tries the (empty) token instead of the OIDC exchange.
        run: pnpm release

  release_dryrun:
    name: Release Dry Run
    runs-on: ubuntu-latest
    needs: guard
    if: github.event.inputs.release_mode == 'dry-run'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Release Dry Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm release:dry
